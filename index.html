        <h2>What is a life in months calculator?</h2>
        <p>
          A "life in months" calculator converts your lifespan into months to make finite time feel real and tangible.
          A 90-year life is 1,080 months. Most people in their 20s have between 700 and 850 months remaining.
          After sleep, work, commuting, chores, and screen time are subtracted, the actual free months
          left for art, travel, relationships, and legacy is often surprisingly small.
        </p>

        <h2>What is memento mori?</h2>
        <p>
          Memento mori (Latin: "remember that you will die") is a Stoic practice of contemplating mortality
          to clarify priorities. A memento mori life calendar visualizes your entire lifespan as a grid —
          each cell represents a week or month. The 334 Months adapts this into an interactive tool that
          shows not just what has passed, but how your remaining time is actually allocated.
        </p>

        <h2>How much free time does screen time consume?</h2>
        <p>
          At the 2026 global average of 6 hours 54 minutes of daily screen time, screens consume roughly
